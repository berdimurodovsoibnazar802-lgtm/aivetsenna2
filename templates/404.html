<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Alvitsenna</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050A18;
      color: #fff;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      text-align: center;
    }
    .code {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #00D4FF;
      text-shadow: 0 0 32px rgba(0,212,255,0.4);
    }
    .title {
      margin-top: 1rem;
      font-size: 1.375rem;
      font-weight: 700;
      color: #fff;
    }
    .sub {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      max-width: 320px;
    }
    .btn {
      margin-top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.8rem 2rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #00D4FF 0%, #7B2FFF 100%);
      color: #050A18;
      font-weight: 700;
      font-size: 0.9375rem;
      text-decoration: none;
      box-shadow: 0 0 18px rgba(0,212,255,0.35);
    }
  </style>
</head>
<body>
  <p class="code">404</p>
  <p class="title">Sahifa topilmadi</p>
  <p class="sub">Siz qidirgan sahifa mavjud emas yoki ko'chirilgan.</p>
  <a href="/" class="btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9,22 9,12 15,12 15,22"/>
    </svg>
    Bosh sahifaga qaytish
  </a>
</body>
</html>
