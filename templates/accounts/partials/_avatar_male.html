<svg viewBox="0 0 380 620" xmlns="http://www.w3.org/2000/svg"
     style="width:100%; max-width:260px; display:block; margin:0 auto;"
     aria-label="Male digital twin silhouette">

  <defs>
    <radialGradient id="hgM" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF3B5C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF3B5C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pgM" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF3B5C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF3B5C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgM" cx="50%" cy="35%" r="50%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="scanBlurM" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="0 1.5"/>
    </filter>
  </defs>

  <!-- BASE PLATFORM -->
  <ellipse cx="190" cy="613" rx="130" ry="15" fill="url(#bgM)"/>
  <ellipse cx="190" cy="610" rx="94"  ry="7"  fill="none" stroke="#00D4FF" stroke-width="0.9" opacity="0.45"/>
  <ellipse cx="190" cy="607" rx="60"  ry="4"  fill="none" stroke="#00D4FF" stroke-width="1.0" opacity="0.65"/>

  <!-- TORSO GRID TEXTURE -->
  <g stroke="#00D4FF" stroke-width="0.55" opacity="0.08">
    <line x1="90"  y1="172" x2="290" y2="172"/>
    <line x1="90"  y1="200" x2="290" y2="200"/>
    <line x1="92"  y1="228" x2="288" y2="228"/>
    <line x1="93"  y1="256" x2="287" y2="256"/>
    <line x1="94"  y1="284" x2="286" y2="284"/>
    <line x1="96"  y1="312" x2="284" y2="312"/>
    <line x1="98"  y1="340" x2="282" y2="340"/>
    <line x1="100" y1="368" x2="280" y2="368"/>
  </g>

  <!-- HEAD -->
  <circle cx="190" cy="58" r="43" fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.88"/>
  <line x1="190" y1="20"  x2="190" y2="96"  stroke="#00D4FF" stroke-width="0.4" opacity="0.18"/>
  <line x1="153" y1="58"  x2="227" y2="58"  stroke="#00D4FF" stroke-width="0.4" opacity="0.18"/>
  <line x1="158" y1="34"  x2="222" y2="82"  stroke="#00D4FF" stroke-width="0.3" opacity="0.10"/>
  <line x1="222" y1="34"  x2="158" y2="82"  stroke="#00D4FF" stroke-width="0.3" opacity="0.10"/>

  <!-- NECK -->
  <line x1="175" y1="101" x2="170" y2="130" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <line x1="205" y1="101" x2="210" y2="130" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <line x1="170" y1="130" x2="210" y2="130" stroke="#00D4FF" stroke-width="1.0" opacity="0.55"/>

  <!-- CLAVICLES / SHOULDERS (broad, male) -->
  <path d="M 170,130 Q 126,136 70,152" fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.85"/>
  <path d="M 210,130 Q 254,136 310,152" fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.85"/>

  <!-- LEFT ARM -->
  <path d="M 70,152 Q 50,220 44,318 Q 42,364 50,422"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.75"/>
  <path d="M 90,157 Q 80,224 78,316 Q 78,360 82,416"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.75"/>
  <circle cx="46" cy="314" r="2.5" fill="#00D4FF" opacity="0.30"/>
  <path d="M 50,422 Q 46,436 52,446 Q 62,452 74,446 Q 82,438 82,424 L 82,416"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.68"/>

  <!-- RIGHT ARM -->
  <path d="M 310,152 Q 330,220 336,318 Q 338,364 330,422"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.75"/>
  <path d="M 290,157 Q 300,224 302,316 Q 302,360 298,416"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.75"/>
  <circle cx="334" cy="314" r="2.5" fill="#00D4FF" opacity="0.30"/>
  <path d="M 330,422 Q 334,436 328,446 Q 318,452 306,446 Q 298,438 298,424 L 298,416"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.68"/>

  <!-- TORSO -->
  <path d="M 90,157 Q 100,244 104,334 Q 102,360 98,388"
        fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.85"/>
  <path d="M 290,157 Q 280,244 276,334 Q 278,360 282,388"
        fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.85"/>

  <!-- HIPS / PELVIS -->
  <path d="M 98,388  Q 96,408 100,432" fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <path d="M 282,388 Q 284,408 280,432" fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <path d="M 100,432 Q 146,422 190,425 Q 234,422 280,432"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.78"/>

  <!-- LEFT LEG -->
  <path d="M 100,432 Q 93,505 95,558 Q 96,576 97,596"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <path d="M 140,430 Q 137,502 137,556 Q 137,575 135,595"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <circle cx="94" cy="506" r="3" fill="#00D4FF" opacity="0.28"/>
  <path d="M 97,596 Q 95,607 99,612 L 139,612 L 139,602 L 135,595"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.70"/>

  <!-- RIGHT LEG -->
  <path d="M 280,432 Q 287,505 285,558 Q 284,576 283,596"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <path d="M 240,430 Q 243,502 243,556 Q 243,575 245,595"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <circle cx="286" cy="506" r="3" fill="#00D4FF" opacity="0.28"/>
  <path d="M 283,596 Q 285,607 281,612 L 241,612 L 241,602 L 245,595"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.70"/>

  <!-- HEART ZONE (blood pressure risk) -->
  <circle cx="172" cy="196" r="28" fill="url(#hgM)"
    opacity="{% if profile.bp_systolic and profile.bp_systolic >= 130 %}1{% else %}0.18{% endif %}"/>
  <path d="M 172,213 C 172,213 148,197 148,181 C 148,167 159,163 172,174 C 185,163 196,167 196,181 C 196,197 172,213 172,213 Z"
        fill="#FF3B5C"
        opacity="{% if profile.bp_systolic and profile.bp_systolic >= 130 %}0.92{% else %}0.20{% endif %}"/>
  {% if profile.bp_systolic and profile.bp_systolic >= 130 %}
  <circle cx="172" cy="190" r="22" fill="none" stroke="#FF3B5C" stroke-width="0.8" opacity="0.35"/>
  {% endif %}

  <!-- PANCREAS ZONE (glucose risk) -->
  <circle cx="161" cy="232" r="20" fill="url(#pgM)"
    opacity="{% if profile.blood_glucose and profile.blood_glucose >= 7.0 %}1{% else %}0.15{% endif %}"/>
  <circle cx="161" cy="232" r="7.5" fill="#FF3B5C"
    opacity="{% if profile.blood_glucose and profile.blood_glucose >= 7.0 %}0.88{% else %}0.18{% endif %}"/>

  <!-- ANIMATED SCAN LINE -->
  <rect x="0" y="0" width="380" height="2" rx="1" fill="#00D4FF" filter="url(#scanBlurM)">
    <animate attributeName="y" from="15" to="614" dur="4s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.70;0.70;0" keyTimes="0;0.03;0.97;1" dur="4s" repeatCount="indefinite"/>
  </rect>

</svg>
