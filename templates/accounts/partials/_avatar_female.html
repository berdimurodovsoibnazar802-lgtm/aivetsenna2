<svg viewBox="0 0 380 620" xmlns="http://www.w3.org/2000/svg"
     style="width:100%; max-width:260px; display:block; margin:0 auto;"
     aria-label="Female digital twin silhouette">

  <defs>
    <radialGradient id="hgF" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF3B5C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF3B5C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pgF" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF3B5C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF3B5C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgF" cx="50%" cy="35%" r="50%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="scanBlurF" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="0 1.5"/>
    </filter>
  </defs>

  <!-- BASE PLATFORM -->
  <ellipse cx="190" cy="613" rx="130" ry="15" fill="url(#bgF)"/>
  <ellipse cx="190" cy="610" rx="94"  ry="7"  fill="none" stroke="#00D4FF" stroke-width="0.9" opacity="0.45"/>
  <ellipse cx="190" cy="607" rx="60"  ry="4"  fill="none" stroke="#00D4FF" stroke-width="1.0" opacity="0.65"/>

  <!-- TORSO GRID TEXTURE -->
  <g stroke="#00D4FF" stroke-width="0.55" opacity="0.08">
    <line x1="94"  y1="172" x2="286" y2="172"/>
    <line x1="94"  y1="200" x2="286" y2="200"/>
    <line x1="96"  y1="228" x2="284" y2="228"/>
    <line x1="100" y1="256" x2="280" y2="256"/>
    <line x1="104" y1="284" x2="276" y2="284"/>
    <line x1="106" y1="312" x2="274" y2="312"/>
    <line x1="104" y1="340" x2="276" y2="340"/>
    <line x1="98"  y1="368" x2="282" y2="368"/>
  </g>

  <!-- HEAD -->
  <circle cx="190" cy="58" r="43" fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.88"/>
  <line x1="190" y1="20"  x2="190" y2="96"  stroke="#00D4FF" stroke-width="0.4" opacity="0.18"/>
  <line x1="153" y1="58"  x2="227" y2="58"  stroke="#00D4FF" stroke-width="0.4" opacity="0.18"/>
  <line x1="158" y1="34"  x2="222" y2="82"  stroke="#00D4FF" stroke-width="0.3" opacity="0.10"/>
  <line x1="222" y1="34"  x2="158" y2="82"  stroke="#00D4FF" stroke-width="0.3" opacity="0.10"/>

  <!-- NECK -->
  <line x1="177" y1="101" x2="172" y2="130" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <line x1="203" y1="101" x2="208" y2="130" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <line x1="172" y1="130" x2="208" y2="130" stroke="#00D4FF" stroke-width="1.0" opacity="0.55"/>

  <!-- CLAVICLES / SHOULDERS (narrower, female) -->
  <path d="M 172,130 Q 134,137 82,152"  fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.85"/>
  <path d="M 208,130 Q 246,137 298,152" fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.85"/>

  <!-- LEFT ARM (slimmer) -->
  <path d="M 82,152 Q 63,220 58,316 Q 56,362 63,420"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.74"/>
  <path d="M 96,156 Q 87,224 86,314 Q 86,358 88,414"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.74"/>
  <circle cx="57" cy="313" r="2.5" fill="#00D4FF" opacity="0.28"/>
  <path d="M 63,420 Q 60,434 65,443 Q 74,449 86,443 Q 92,436 88,422 L 88,414"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.66"/>

  <!-- RIGHT ARM -->
  <path d="M 298,152 Q 317,220 322,316 Q 324,362 317,420"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.74"/>
  <path d="M 284,156 Q 293,224 294,314 Q 294,358 292,414"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.74"/>
  <circle cx="323" cy="313" r="2.5" fill="#00D4FF" opacity="0.28"/>
  <path d="M 317,420 Q 320,434 315,443 Q 306,449 294,443 Q 288,436 292,422 L 292,414"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.66"/>

  <!-- TORSO (hourglass: chest → narrow waist → wider hips) -->
  <path d="M 96,156 Q 104,220 112,305 Q 108,340 96,375"
        fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.86"/>
  <path d="M 284,156 Q 276,220 268,305 Q 272,340 284,375"
        fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.86"/>
  <!-- subtle chest suggestion -->
  <path d="M 96,156 Q 90,178 94,198" fill="none" stroke="#00D4FF" stroke-width="0.7" opacity="0.28"/>
  <path d="M 284,156 Q 290,178 286,198" fill="none" stroke="#00D4FF" stroke-width="0.7" opacity="0.28"/>

  <!-- HIPS (wider than male) / PELVIS -->
  <path d="M 96,375  Q 88,400 88,432"  fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.82"/>
  <path d="M 284,375 Q 292,400 292,432" fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.82"/>
  <path d="M 88,432 Q 138,420 190,424 Q 242,420 292,432"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.78"/>

  <!-- LEFT LEG -->
  <path d="M 88,432  Q 82,506 84,558 Q 85,576 86,596"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <path d="M 130,431 Q 127,504 127,557 Q 127,575 126,595"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <circle cx="83" cy="506" r="3" fill="#00D4FF" opacity="0.26"/>
  <path d="M 86,596 Q 84,607 88,612 L 128,612 L 128,602 L 126,595"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.70"/>

  <!-- RIGHT LEG -->
  <path d="M 292,432 Q 298,506 296,558 Q 295,576 294,596"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <path d="M 250,431 Q 253,504 253,557 Q 253,575 254,595"
        fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.80"/>
  <circle cx="297" cy="506" r="3" fill="#00D4FF" opacity="0.26"/>
  <path d="M 294,596 Q 296,607 292,612 L 252,612 L 252,602 L 254,595"
        fill="none" stroke="#00D4FF" stroke-width="1.1" opacity="0.70"/>

  <!-- HEART ZONE (blood pressure risk) -->
  <circle cx="174" cy="196" r="28" fill="url(#hgF)"
    opacity="{% if profile.bp_systolic and profile.bp_systolic >= 130 %}1{% else %}0.18{% endif %}"/>
  <path d="M 174,213 C 174,213 150,197 150,181 C 150,167 161,163 174,174 C 187,163 198,167 198,181 C 198,197 174,213 174,213 Z"
        fill="#FF3B5C"
        opacity="{% if profile.bp_systolic and profile.bp_systolic >= 130 %}0.92{% else %}0.20{% endif %}"/>
  {% if profile.bp_systolic and profile.bp_systolic >= 130 %}
  <circle cx="174" cy="191" r="22" fill="none" stroke="#FF3B5C" stroke-width="0.8" opacity="0.35"/>
  {% endif %}

  <!-- PANCREAS ZONE (glucose risk) -->
  <circle cx="163" cy="232" r="20" fill="url(#pgF)"
    opacity="{% if profile.blood_glucose and profile.blood_glucose >= 7.0 %}1{% else %}0.15{% endif %}"/>
  <circle cx="163" cy="232" r="7.5" fill="#FF3B5C"
    opacity="{% if profile.blood_glucose and profile.blood_glucose >= 7.0 %}0.88{% else %}0.18{% endif %}"/>

  <!-- ANIMATED SCAN LINE -->
  <rect x="0" y="0" width="380" height="2" rx="1" fill="#00D4FF" filter="url(#scanBlurF)">
    <animate attributeName="y" from="15" to="614" dur="4s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.70;0.70;0" keyTimes="0;0.03;0.97;1" dur="4s" repeatCount="indefinite"/>
  </rect>

</svg>
